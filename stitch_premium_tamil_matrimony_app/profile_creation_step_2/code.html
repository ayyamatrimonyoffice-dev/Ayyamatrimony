</label>

<input class="hidden peer" name="gender" type="radio" value="female"/>

<!-- Bottom Navigation Mockup (Hidden on focused transactional flow but referenced for style) -->
<!-- Determined active: none for focused journey -->
<script>
        // Micro-interaction for Age Calculation
        const dobInput = document.getElementById('dob');
        const displayAge = document.getElementById('displayAge');

        dobInput.addEventListener('change', (e) => {
            const birthDate = new Date(e.target.value);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            
            if (!isNaN(age) && age > 0) {
                displayAge.textContent = age;
                displayAge.classList.add('text-primary', 'font-bold');
            } else {
                displayAge.textContent = '--';
                displayAge.classList.remove('text-primary', 'font-bold');
            }
        });

        // Simple form validation feedback
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('blur', () => {
                if (input.value) {
                    input.classList.add('border-primary/20');
                }
            });
        });
    </script>
