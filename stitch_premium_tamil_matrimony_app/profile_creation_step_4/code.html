<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md bg-surface/70 border-b border-outline-variant/20 shadow-sm">

</button>
<span class="font-headline-md text-headline-md-mobile text-primary font-bold tracking-tight">Matrimony</span>
</div>
<button class="font-label-lg text-label-lg text-primary px-sm py-xs hover:bg-surface-container-high rounded-lg transition-colors">தமிழ்</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-24 pb-32 px-container-margin flex justify-center items-start">
<div class="w-full max-w-xl animate-fade-in-up">
<!-- Stepped Onboarding: Progress Indicator -->
<div class="mb-xl">
<div class="flex justify-between items-end mb-xs">
<h1 class="font-headline-md text-headline-md-mobile text-primary">Education &amp; Career</h1>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-70">Step 4 of 9</span>
</div>

</div>
</div>
<!-- Form Container -->
<div class="space-y-lg">
<!-- Visual Background Ornament -->
<div class="relative overflow-hidden rounded-xl border border-[#D4AF37]/20 p-lg glass-card shadow-[0_15px_30px_-15px_rgba(0,0,0,0.04)]">
<div class="absolute -right-12 -top-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<form class="space-y-lg relative z-10" id="education-career-form">
<!-- Highest Education -->
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface-variant px-1" for="education">Highest Education</label>
<div class="relative">

<option value="bachelors">Bachelor's Degree</option>
<option value="masters">Master's Degree</option>
<option value="doctorate">Doctorate / PhD</option>
<option value="diploma">Diploma</option>
<option value="high-school">High School</option>
<option value="other">Other Professional Qualification</option>
</select>
</div>
</div>
<!-- Occupation -->
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface-variant px-1" for="occupation">Current Occupation</label>
<div class="relative">
<select class="w-full h-14 px-md bg-surface-container-low border-none rounded-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="occupation" name="occupation">
<option disabled="" selected="" value="">What do you do?</option>
<option value="software">Software Professional</option>
<option value="engineer">Engineer (Non-IT)</option>

<option value="teacher">Education / Teacher</option>

<option value="creative">Creative / Arts / Media</option>
<option value="banking">Banking / Finance</option>

<div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-secondary-container/10 rounded-full blur-[150px] -ml-64 -mb-64"></div>
</div>
<script>
        // Micro-interactions for form fields
        const selects = document.querySelectorAll('select');
        selects.forEach(select => {
            select.addEventListener('focus', () => {
                select.parentElement.parentElement.classList.add('scale-[1.02]');
                select.parentElement.parentElement.classList.add('transition-transform');
            });
            select.addEventListener('blur', () => {
                select.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });

        // Simple validation visualization
        const nextBtn = document.querySelector('button.bg-primary');
        nextBtn.addEventListener('click', (e) => {
            const allSelected = Array.from(selects).every(s => s.value !== "");
            if (!allSelected) {
                // Shake effect or simple console feedback for this demo
                const container = document.querySelector('.glass-card');
                container.classList.add('animate-shake');
                setTimeout(() => container.classList.remove('animate-shake'), 500);
            } else {
                // Visual feedback for successful step completion
                nextBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                setTimeout(() => {
                    alert('Moving to Step 5: Family Details');
                    location.reload(); // Refresh for demo purpose
                }, 800);
            }
        });
    </script>
<style>
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.6s ease-out forwards;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
