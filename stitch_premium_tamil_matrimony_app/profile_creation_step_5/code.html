<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-node {
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }
        .luxury-card {
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.04);
        }
        .radio-peer:checked + .radio-card {
            border-color: #570000;
            background-color: #ffdad4;
            box-shadow: 0 0 0 1.5px #570000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md bg-surface/70 border-b border-outline-variant/20 shadow-sm h-16">
<div class="flex justify-between items-center px-container-margin py-xs max-w-7xl mx-auto h-full">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-surface-tint active:scale-95 duration-200">arrow_back</button>
<span class="font-headline-md text-headline-md-mobile text-primary font-bold tracking-tight">Matrimony</span>
</div>
<button class="font-label-lg text-label-lg text-surface-tint hover:bg-surface-container-high transition-colors px-md py-xs rounded-lg">தமிழ்</button>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-container-margin max-w-2xl mx-auto w-full">
<!-- Progress Stepper Component -->
<div class="mb-xl">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-sm text-label-sm text-on-surface-variant">STEP 5 OF 9</span>
<span class="font-label-sm text-label-sm text-primary font-bold">Family Details</span>
</div>
<div class="relative h-1.5 w-full bg-[#F3E5AB] rounded-full overflow-hidden"> <!-- Champagne Background -->
<div class="absolute left-0 top-0 h-full bg-primary rounded-full transition-all duration-700" style="width: 55.5%"></div> <!-- Maroon Fill -->
</div>
</div>
<!-- Form Content -->
<div class="space-y-xl">
<section class="text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">Tell us about your family</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Understanding your family background helps us find the most compatible matches for your lifestyle.</p>
</section>
<form class="space-y-xl">
<!-- Family Type Selection -->
<div class="space-y-md">
<label class="font-title-lg text-title-lg text-on-surface block">Family Type</label>
<div class="grid grid-cols-2 gap-md">
<label class="relative cursor-pointer">
<input checked="" class="sr-only peer radio-peer" name="family_type" type="radio" value="joint"/>
<div class="radio-card p-md border border-outline-variant/30 rounded-xl bg-surface-container-lowest transition-all duration-200 flex flex-col items-center gap-xs hover:border-primary/50 luxury-card">
<span class="material-symbols-outlined text-surface-tint text-3xl">groups</span>
<span class="font-label-lg text-label-lg">Joint Family</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="sr-only peer radio-peer" name="family_type" type="radio" value="nuclear"/>
<div class="radio-card p-md border border-outline-variant/30 rounded-xl bg-surface-container-lowest transition-all duration-200 flex flex-col items-center gap-xs hover:border-primary/50 luxury-card">
<span class="material-symbols-outlined text-surface-tint text-3xl">home</span>
<span class="font-label-lg text-label-lg">Nuclear Family</span>
</div>
</label>
</div>
</div>
<!-- Family Values Selection -->
<div class="space-y-md">
<label class="font-title-lg text-title-lg text-on-surface block">Family Values</label>
<div class="grid grid-cols-1 md:grid-cols-3 gap-md">
<label class="relative cursor-pointer">
<input checked="" class="sr-only peer radio-peer" name="family_values" type="radio" value="traditional"/>
<div class="radio-card p-md border border-outline-variant/30 rounded-xl bg-surface-container-lowest transition-all duration-200 text-center hover:border-primary/50 luxury-card">
<span class="font-label-lg text-label-lg block">Traditional</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="sr-only peer radio-peer" name="family_values" type="radio" value="moderate"/>
<div class="radio-card p-md border border-outline-variant/30 rounded-xl bg-surface-container-lowest transition-all duration-200 text-center hover:border-primary/50 luxury-card">
<span class="font-label-lg text-label-lg block">Moderate</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="sr-only peer radio-peer" name="family_values" type="radio" value="liberal"/>
<div class="radio-card p-md border border-outline-variant/30 rounded-xl bg-surface-container-lowest transition-all duration-200 text-center hover:border-primary/50 luxury-card">
<span class="font-label-lg text-label-lg block">Liberal</span>
</div>
</label>
</div>
</div>
<!-- Decorative Asset for Trust -->
<div class="luxury-card bg-surface-container-low p-lg rounded-xl flex items-start gap-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<div>
<p class="font-label-lg text-label-lg text-on-surface mb-base">Dignity &amp; Privacy</p>
<p class="font-body-md text-body-md text-on-surface-variant">Your family details are only shared with matches who meet your initial privacy criteria.</p>
</div>
</div>
</form>
</div>
</main>
<!-- Fixed Bottom Actions (Contextual suppressing standard Nav for transactional flow) -->
<footer class="fixed bottom-0 w-full bg-surface/80 backdrop-blur-lg border-t border-outline-variant/20 z-50">
<div class="max-w-2xl mx-auto px-container-margin py-md flex gap-md">
<button class="flex-1 py-md border border-outline text-primary font-label-lg text-label-lg rounded-full active:scale-95 transition-transform hover:bg-surface-container-high">
                Back
            </button>
<button class="flex-[2] py-md bg-primary text-on-primary font-label-lg text-label-lg rounded-full shadow-lg active:scale-95 transition-transform hover:bg-primary-container">
                Continue
            </button>
</div>
</footer>
<!-- Subtle Background Shader Element -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20">

</div>
<script>
        // Micro-interaction for feedback
        document.querySelectorAll('.radio-card').forEach(card => {
            card.addEventListener('click', () => {
                // Subtle pulse animation logic can go here
                card.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    card.style.transform = 'scale(1)';
                }, 100);
            });
        });
    </script>
</body></html>
